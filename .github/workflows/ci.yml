name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # go.sum is committed (ADR-0017: primus captures it from the verify step
      # at apply time), so CI builds against a pinned, hash-verified graph.
      # `go mod download` fetches exactly what go.sum pins; -mod=readonly fails
      # the build on a stale sum instead of rewriting it.
      - run: go mod download
      - run: go build -mod=readonly ./...
      # Supply-chain drift gate: the module cache matches go.sum (verify) and
      # go.mod/go.sum are tidy (tidy -diff exits non-zero on any needed change),
      # so a dependency edit that wasn't accompanied by a refreshed go.sum fails.
      - name: dependencies tidy + verified
        run: |
          go mod verify
          go mod tidy -diff
      # Race detector: these Foundations are concurrent (goroutines, signal
      # handling, a server shared across connections), so -race earns its keep.
      # Needs CGO (gcc) — present on ubuntu-latest.
      - run: go test -race ./...
      # Known-CVE scan of the dependency tree (reachable-vuln analysis).
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      # Lint config (.golangci.yml) is shipped by the language module; the
      # workflow that runs it stays owned here (cicd-github). golangci-lint v2
      # is pinned: the binary must be built with a Go >= the module's go
      # directive, and Foundations on Go 1.25+ (e.g. the mcp SDK requires it)
      # break the older go1.24-built v1.x line. The language module ships a v2
      # (`version: "2"`) .golangci.yml to match.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      # Docker build sanity: builds the rendered multi-stage Dockerfile so
      # base-image / go-directive drift (e.g. a go.mod floor the pinned
      # toolchain can't satisfy) fails CI instead of a developer's machine.
      - name: docker build (sanity)
        run: docker build -t ci-build-check .

  primus-check-required:
    # Soft nag (issue #53): warns when a locked module is below its
    # catalog `required:` floor — surfaces a never-merged required-update
    # PR without blocking the build. Flip `--strict` in the run line below
    # for hard enforcement.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: "Check catalog required: floors"
        # PRIMUS_CATALOG must be configured as a repo or org variable to
        # enable this check. When unset, the step skips with exit 0 — same
        # posture as the primus-not-on-PATH skip below: an un-configured
        # nag shouldn't show up red on every PR. The job is the nag; the
        # red badge people actually need is below_floor rows from a real
        # check run, not a config-missing badge.
        run: |
          if [[ -z "${PRIMUS_CATALOG:-}" ]]; then
            echo "PRIMUS_CATALOG (repo or org variable) is not set — skipping check-required nag. Set it to a catalog source URI to enable per-PR floor checking."
            exit 0
          fi
          if ! command -v primus >/dev/null 2>&1; then
            echo "primus not on PATH — install it in the runner image to enable this nag."
            exit 0
          fi
          primus check-required --catalog "$PRIMUS_CATALOG" --repo .
        env:
          PRIMUS_CATALOG: ${{ vars.PRIMUS_CATALOG }}
